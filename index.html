<!DOCTYPE html>
<html>
<head>
    <title>Web Demo Welcome</title>
</head>
<body style="background-color: #0a0a0a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <svg width="600" height="200" viewBox="0 0 600 200">
        <defs>
            <filter id="glow">
                <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>

        <text x="50%" y="50%" text-anchor="middle" dy=".3em" 
              style="font-size: 80px; font-weight: bold; fill: none; stroke: #00ffcc; stroke-width: 2; filter: url(#glow);">
            WE Will Dominate
            
            <animate attributeName="stroke-dasharray" from="0, 500" to="500, 0" dur="3s" repeatCount="indefinite" />
            
            <animate attributeName="opacity" values="0;1;0.5;1;0" dur="4s" repeatCount="indefinite" />
            
            <animate attributeName="stroke" values="#00ffcc;#0077ff;#00ffcc" dur="5s" repeatCount="indefinite" />
        </text>

        <text x="50%" y="80%" text-anchor="middle" style="fill: #555; font-size: 14px; letter-spacing: 5px;">
            INITIALIZING WEB_DEMO_V1.0
            <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
        </text>
    </svg>

</body>
</html>
